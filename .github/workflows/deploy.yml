name: Deploy

# Push to stage → stage deploy. Push to main → production deploy.
# Manual workflow_dispatch with environment selector also supported.
#
# Two-step deploy per environment:
#   1. `wrangler deploy --env <env>`        creates the Worker on first run,
#                                           updates its code on subsequent runs
#   2. `wrangler secret put ... --env <env>` pushes secrets onto the existing
#                                            Worker (idempotent — no-op if value
#                                            unchanged, rotation if changed)
#
# Note: cloudflare/wrangler-action@v3 uploads `secrets:` BEFORE running its
# `command:`, which fails on first-ever deploy because the Worker doesn't
# exist yet. So we don't use its `secrets:` input; we run wrangler directly.
#
# Required GitHub Actions repository secrets:
#   CLOUDFLARE_API_TOKEN              — Cloudflare API token (Workers + R2 scopes)
#   CLOUDFLARE_ACCOUNT_ID         — Cloudflare account ID
#   JWT_SIGNING_SECRET_STAGE      — stage Worker's JWT secret (matches backend)
#   JWT_SIGNING_SECRET_PROD       — production Worker's JWT secret
#   BACKEND_SHARED_SECRET_STAGE   — stage X-Backend-Auth secret
#   BACKEND_SHARED_SECRET_PROD    — production X-Backend-Auth secret

on:
  push:
    branches: [main, stage]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - stage
          - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'stage') }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'stage') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Resolve target
        id: target
        run: |
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
          else
            echo "env=stage" >> "$GITHUB_OUTPUT"
          fi

      - name: Print wrangler version
        run: npx wrangler --version

      # ---- STAGE ------------------------------------------------------------

      - name: Deploy Worker code (stage)
        if: steps.target.outputs.env == 'stage'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin wrangler v4 — the action defaults to v3, which lags behind
          # our local devDependency. Using the same major in CI and locally
          # avoids surprises from v3/v4 wrangler.toml differences.
          wranglerVersion: "4"
          command: deploy --env stage

      - name: Push secrets (stage)
        if: steps.target.outputs.env == 'stage'
        # `echo -n` avoids a trailing newline ending up in the secret value.
        # The local wrangler from `npm ci` is used (npx resolves to it).
        run: |
          echo -n "$JWT_SIGNING_SECRET" | npx wrangler secret put JWT_SIGNING_SECRET --env stage
          echo -n "$BACKEND_SHARED_SECRET" | npx wrangler secret put BACKEND_SHARED_SECRET --env stage
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          JWT_SIGNING_SECRET: ${{ secrets.JWT_SIGNING_SECRET_STAGE }}
          BACKEND_SHARED_SECRET: ${{ secrets.BACKEND_SHARED_SECRET_STAGE }}

      # ---- PRODUCTION -------------------------------------------------------

      - name: Deploy Worker code (production)
        if: steps.target.outputs.env == 'production'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin wrangler v4 — the action defaults to v3, which lags behind
          # our local devDependency. Using the same major in CI and locally
          # avoids surprises from v3/v4 wrangler.toml differences.
          wranglerVersion: "4"
          command: deploy --env production

      - name: Push secrets (production)
        if: steps.target.outputs.env == 'production'
        run: |
          echo -n "$JWT_SIGNING_SECRET" | npx wrangler secret put JWT_SIGNING_SECRET --env production
          echo -n "$BACKEND_SHARED_SECRET" | npx wrangler secret put BACKEND_SHARED_SECRET --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          JWT_SIGNING_SECRET: ${{ secrets.JWT_SIGNING_SECRET_PROD }}
          BACKEND_SHARED_SECRET: ${{ secrets.BACKEND_SHARED_SECRET_PROD }}
